services:
  app:
    build: ./app/
    expose:
      - "3000"
    networks:
      - web-network

  # Прокси-сервер Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - web-network

  nginx1:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx1.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nginx
    networks:
      - web-network

  nginx2:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx2.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nginx1
    networks:
      - web-network
networks:
  web-network:
    driver: bridge
